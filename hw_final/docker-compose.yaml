version: '3.8'

services:
  # PostgreSQL для MLflow
  postgres_mlflow:
    image: postgres:15-alpine
    container_name: postgres_mlflow
    environment:
      POSTGRES_USER: ${MLFLOW_DB_USER}
      POSTGRES_PASSWORD: ${MLFLOW_DB_PASSWORD}
      POSTGRES_DB: ${MLFLOW_DB_NAME}
    volumes:
      - mlflow_db_data:/var/lib/postgresql/data
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MLFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MLflow Tracking Server
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@postgres_mlflow:5432/${MLFLOW_DB_NAME}
      MLFLOW_ARTIFACT_ROOT: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - ml_network
    depends_on:
      postgres_mlflow:
        condition: service_healthy
    command: >
      mlflow server
      --backend-store-uri postgresql://${MLFLOW_DB_USER}:${MLFLOW_DB_PASSWORD}@postgres_mlflow:5432/${MLFLOW_DB_NAME}
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

  # PostgreSQL для Airflow
  postgres_airflow:
    image: postgres:15-alpine
    container_name: postgres_airflow
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Airflow Init (миграции)
  airflow_init:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin2026
    networks:
      - ml_network
    depends_on:
      postgres_airflow:
        condition: service_healthy
    command: version

  # Airflow Webserver
  airflow_webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    networks:
      - ml_network
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    command: webserver

  # Airflow Scheduler
  airflow_scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    networks:
      - ml_network
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    command: scheduler

  # Airflow Triggerer
  airflow_triggerer:
    image: apache/airflow:2.8.1-python3.11
    container_name: airflow_triggerer
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
      AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    networks:
      - ml_network
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    command: triggerer

  # MinIO для LakeFS
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - ml_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL для LakeFS
  postgres_lakefs:
    image: postgres:15-alpine
    container_name: postgres_lakefs
    environment:
      POSTGRES_USER: ${LAKEFS_DB_USER}
      POSTGRES_PASSWORD: ${LAKEFS_DB_PASSWORD}
      POSTGRES_DB: ${LAKEFS_DB_NAME}
    volumes:
      - lakefs_db_data:/var/lib/postgresql/data
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LAKEFS_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LakeFS
  lakefs:
    image: treeverse/lakefs:latest
    container_name: lakefs
    ports:
      - "8001:8000"
    environment:
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: ${LAKEFS_AUTH_ENCRYPT_SECRET_KEY}
      LAKEFS_DATABASE_TYPE: ${LAKEFS_DATABASE_TYPE}
      LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: postgres://${LAKEFS_DB_USER}:${LAKEFS_DB_PASSWORD}@postgres_lakefs:5432/${LAKEFS_DB_NAME}?sslmode=disable
      LAKEFS_BLOCKSTORE_TYPE: ${LAKEFS_BLOCKSTORE_TYPE}
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: ${LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID}
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: ${LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY}
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: ${LAKEFS_BLOCKSTORE_S3_ENDPOINT}
      LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: ${LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE}
    networks:
      - ml_network
    depends_on:
      postgres_lakefs:
        condition: service_healthy
      minio:
        condition: service_healthy

  # JupyterHub
  jupyterhub:
    build:
      context: ./jupyterhub
      dockerfile: Dockerfile
    container_name: jupyterhub
    ports:
      - "8888:8000"
    environment:
      JUPYTERHUB_ADMIN_PASSWORD: ${JUPYTERHUB_ADMIN_PASSWORD}
    volumes:
      - ./jupyterhub/jupyterhub_config.py:/srv/jupyterhub/jupyterhub_config.py
      - jupyterhub_data:/srv/jupyterhub
    networks:
      - ml_network
    command: jupyterhub -f /srv/jupyterhub/jupyterhub_config.py

  # PostgreSQL для ML Service
  postgres_ml_service:
    image: postgres:15-alpine
    container_name: postgres_ml_service
    environment:
      POSTGRES_USER: ${ML_SERVICE_DB_USER}
      POSTGRES_PASSWORD: ${ML_SERVICE_DB_PASSWORD}
      POSTGRES_DB: ${ML_SERVICE_DB_NAME}
    volumes:
      - ml_service_db_data:/var/lib/postgresql/data
    networks:
      - ml_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ML_SERVICE_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ML Service
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ml_service
    ports:
      - "8000:8000"
    environment:
      ML_SERVICE_DB_USER: ${ML_SERVICE_DB_USER}
      ML_SERVICE_DB_PASSWORD: ${ML_SERVICE_DB_PASSWORD}
      ML_SERVICE_DB_NAME: ${ML_SERVICE_DB_NAME}
    networks:
      - ml_network
    depends_on:
      postgres_ml_service:
        condition: service_healthy

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - ml_network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - ml_network
    depends_on:
      - prometheus

volumes:
  mlflow_db_data:
  mlflow_artifacts:
  airflow_db_data:
  airflow_logs:
  lakefs_db_data:
  minio_data:
  jupyterhub_data:
  ml_service_db_data:
  prometheus_data:
  grafana_data:

networks:
  ml_network:
    driver: bridge
