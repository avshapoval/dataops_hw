replicaCount: 2

image:
  repository: username/fastapi-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: nginx
  host: example.com
  path: /
  pathType: Prefix

resources:
  enabled: true
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "1000m"

probes:
  startup:
    enabled: true
    path: /health
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 30
  readiness:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
  liveness:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 2
